<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tatson - Coming Soon</title>
  <meta name="description" content="Official preview of the upcoming project. Stay tuned.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #000;
      --text-color: #f0f0f0;
      --accent-glow: rgba(255, 255, 255, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Montserrat', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Smoke Background */
    #smoke-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
      filter: blur(40px);
    }

    /* Lighting Effects */
    .stage {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .spotlight-container {
      position: absolute;
      top: 0;
      width: 120%;
      height: 100%;
      z-index: 10;
      display: flex;
      justify-content: center;
    }

    .spotlight-broad {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse 80% 100% at 50% -20%, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 70%);
      clip-path: polygon(15% 0, 85% 0, 100% 100%, 0% 100%);
    }

    .spotlight-beam {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse 50% 100% at 50% -10%, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 80%);
      clip-path: polygon(35% 0, 65% 0, 85% 100%, 15% 100%);
      animation: pulse-light 5s ease-in-out infinite;
    }

    .spotlight-core {
      position: absolute;
      top: 0;
      width: 40%;
      height: 40%;
      background: radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0) 70%);
    }

    .floor-glow {
      position: absolute;
      bottom: -15vh;
      width: 100vw;
      height: 30vh;
      background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 100%);
      z-index: 10;
    }

    .floor-highlight {
      position: absolute;
      bottom: -7.5vh;
      width: 50vw;
      height: 15vh;
      background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0) 100%);
      z-index: 10;
      animation: pulse-light 5s ease-in-out infinite 0.5s;
    }

    /* Curtains */
    .curtain-left,
    .curtain-right {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 30%;
      z-index: 20;
      pointer-events: none;
      display: flex;
    }

    .curtain-left {
      left: 0;
      background: linear-gradient(to right, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.8) 30%, rgba(0, 0, 0, 0) 100%);
    }

    .curtain-right {
      right: 0;
      flex-direction: row-reverse;
      background: linear-gradient(to left, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.8) 30%, rgba(0, 0, 0, 0) 100%);
    }

    .fold {
      width: 33%;
      height: 100%;
    }

    .curtain-left .fold {
      background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.4), transparent);
    }

    .curtain-right .fold {
      background: linear-gradient(to left, transparent, rgba(0, 0, 0, 0.4), transparent);
    }

    /* Main Content */
    .content {
      position: relative;
      z-index: 30;
      text-align: center;
      margin-top: -5vh;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 200;
      letter-spacing: 0.4em;
      text-indent: 0.4em;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.4), 0 0 10px rgba(255, 255, 255, 0.6);
      opacity: 0;
      filter: blur(10px);
      transform: translateY(30px);
      animation: reveal-text 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards 0.5s;
    }

    @keyframes pulse-light {

      0%,
      100% {
        opacity: 0.7;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes reveal-text {
      to {
        opacity: 1;
        filter: blur(0px);
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {

      .curtain-left,
      .curtain-right {
        width: 20%;
      }

      .spotlight-container {
        width: 200%;
      }
    }
  </style>
</head>

<body>
  <canvas id="smoke-canvas"></canvas>

  <div class="stage">
    <div class="spotlight-container">
      <div class="spotlight-broad"></div>
      <div class="spotlight-beam"></div>
      <div class="spotlight-core"></div>
    </div>

    <div class="floor-glow"></div>
    <div class="floor-highlight"></div>
  </div>

  <div class="curtain-left">
    <div class="fold"></div>
    <div class="fold"></div>
  </div>
  <div class="curtain-right">
    <div class="fold"></div>
    <div class="fold"></div>
  </div>

  <main class="content">
    <h1>Скоро</h1>
  </main>

  <script>
    const canvas = document.getElementById('smoke-canvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    let animationFrameId;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor(startY) {
        this.init(startY);
      }

      init(startY) {
        this.x = Math.random() * canvas.width;
        this.y = startY !== undefined ? startY : canvas.height + 100;
        this.size = Math.random() * 150 + 100;
        this.speedX = Math.random() * 1.5 - 0.75;
        this.speedY = Math.random() * -1.5 - 0.5;
        this.maxLife = Math.random() * 500 + 300;
        this.life = this.maxLife;
        this.alpha = Math.random() * 0.15 + 0.05;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life--;
        this.size += 0.15;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, (this.life / this.maxLife) * this.alpha);

        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
        gradient.addColorStop(0, 'rgba(220, 220, 230, 0.8)');
        gradient.addColorStop(1, 'rgba(220, 220, 230, 0)');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function init() {
      particles = [];
      for (let i = 0; i < 40; i++) {
        particles.push(new Particle(Math.random() * canvas.height));
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (particles.length < 60 && Math.random() < 0.15) {
        particles.push(new Particle());
      }

      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();

        if (particles[i].life <= 0 || particles[i].y < -particles[i].size) {
          particles.splice(i, 1);
          i--;
        }
      }
      animationFrameId = requestAnimationFrame(animate);
    }

    init();
    animate();
  </script>
</body>

</html>
